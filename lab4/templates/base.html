<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salon Management</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --paper: #fffef9;
            --accent: #1f5f5b;
            --accent-soft: #cfe6e4;
            --text: #1f2421;
            --danger: #b23a48;
            --ok: #2d6a4f;
            --border: #d8d2c4;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(180deg, var(--bg) 0%, #ebe4d7 100%);
            color: var(--text);
        }
        .page {
            max-width: 1080px;
            margin: 0 auto;
            padding: 20px;
        }
        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .nav a {
            text-decoration: none;
            color: var(--paper);
            background: var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
        }
        .card {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .messages {
            margin-bottom: 14px;
        }
        .msg {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .msg.success {
            background: #e8f5e9;
            border: 1px solid #b7dfbd;
            color: var(--ok);
        }
        .msg.error {
            background: #fdeaea;
            border: 1px solid #f4bcbc;
            color: var(--danger);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
        }
        .stat {
            background: var(--accent-soft);
            border-radius: 8px;
            padding: 10px;
        }
        form {
            display: grid;
            gap: 8px;
        }
        button {
            width: max-content;
            border: 0;
            background: var(--accent);
            color: var(--paper);
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border-bottom: 1px solid var(--border);
            text-align: left;
            padding: 8px;
            vertical-align: top;
        }
        .inline-forms {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="nav">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'staff' %}">Staff</a>
        <a href="{% url 'inventory' %}">Inventory</a>
        <a href="{% url 'services' %}">Services</a>
        <a href="{% url 'bookings' %}">Bookings</a>
        <a href="{% url 'finance' %}">Finance</a>
    </div>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="msg {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
